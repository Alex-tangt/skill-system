id: "code-review"
name: "Code Review"
version: "1.0.0"
description: "Reviews code for bugs, style issues, and security vulnerabilities."
tags: ["code", "review", "quality"]
timeout_seconds: 120
max_concurrency: 5
input_schema:
  type: object
  properties:
    code:
      type: string
      description: "Source code to review"
    language:
      type: string
      description: "Programming language"
  required: ["code"]
output_schema:
  type: object
  properties:
    report:
      type: object

steps:
  - id: "lint"
    name: "Lint Check"
    description: "Run static analysis linter"
    tool: "echo"
    depends_on: []
    input_mapping:
      message: "$input.code"
    success_criteria:
      type: "always"
    failure_criteria:
      type: "exception"
    retry:
      max_attempts: 2
      backoff: "exponential"
      backoff_base_seconds: 1
    timeout_seconds: 60

  - id: "security-scan"
    name: "Security Scan"
    description: "Scan for security vulnerabilities"
    tool: "echo"
    depends_on: []
    input_mapping:
      message: "$input.code"
    success_criteria:
      type: "always"
    failure_criteria:
      type: "exception"
    retry:
      max_attempts: 2
      backoff: "exponential"
      backoff_base_seconds: 1
    timeout_seconds: 30

  - id: "report"
    name: "Generate Report"
    description: "Combine lint and security results"
    tool: "echo"
    depends_on: ["lint", "security-scan"]
    input_mapping:
      message: "$steps.lint.output.echoed"
    success_criteria:
      type: "always"
    failure_criteria:
      type: "exception"
    retry:
      max_attempts: 1
    timeout_seconds: 10
