id: "hello-world"
name: "Hello World"
version: "1.0.0"
description: "Simple test skill with two chained echo steps"
tags: ["test", "example"]
timeout_seconds: 30
max_concurrency: 10
input_schema:
  type: object
  properties:
    text:
      type: string
      description: "Text to echo"
  required: ["text"]
output_schema:
  type: object
  properties:
    echoed:
      type: string

steps:
  - id: "echo1"
    name: "First Echo"
    tool: "echo"
    depends_on: []
    input_mapping:
      message: "$input.text"
    success_criteria:
      type: "always"
    failure_criteria:
      type: "exception"
    retry:
      max_attempts: 1
    timeout_seconds: 10

  - id: "echo2"
    name: "Second Echo"
    tool: "echo"
    depends_on: ["echo1"]
    input_mapping:
      message: "$steps.echo1.output.echoed"
    success_criteria:
      type: "always"
    failure_criteria:
      type: "exception"
    retry:
      max_attempts: 1
    timeout_seconds: 10
